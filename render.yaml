services:
  - type: web
    name: ugc26-web
    env: node
    plan: starter
    buildCommand: cd ugc26 && npm ci && npx prisma generate && npm run build
    startCommand: cd ugc26 && npx prisma migrate deploy && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: SMTP_URL
        sync: false
      - key: REDIS_URL
        sync: false
